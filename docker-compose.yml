services:
  # ===========================================
  # Frontend (Caddy + Vue 3 build)
  # ===========================================
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: meu-regional-frontend
    ports:
      - "7000:7000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

  # ===========================================
  # Backend API
  # ===========================================
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: meu-regional-backend
    volumes:
      - backend_data:/app/data
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-in-production}
      - DATABASE_PATH=/app/data/meu-regional.db
      - SCRAPER_API_URL=http://scraper:4000
      - SPOTIFY_EMAIL=${SPOTIFY_EMAIL:-}
      - SPOTIFY_PASSWORD=${SPOTIFY_PASSWORD:-}
    depends_on:
      - scraper
    restart: unless-stopped

  # ===========================================
  # Scraper Service (Web Scraping Isolado)
  # ===========================================
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: meu-regional-scraper
    working_dir: /app
    environment:
      - NODE_ENV=production
      - HEADLESS=true
      - PORT=4000
      - SPOTIFY_EMAIL=${SPOTIFY_EMAIL:-}
      - SPOTIFY_PASSWORD=${SPOTIFY_PASSWORD:-}
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  backend_data:
